<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ClubSphere Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>

<!-- Leaflet Map -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

</head>

<body class="bg-gray-100 p-6">

<div class="max-w-6xl mx-auto space-y-6">

  <h1 class="text-3xl font-bold text-blue-600">ClubSphere Dashboard</h1>

  <!-- CREATE EVENT -->
  <div class="bg-white p-6 rounded-xl shadow">
    <h2 class="text-xl font-semibold mb-4">Create Event</h2>

    <input id="eventName" class="w-full p-2 border rounded mb-3" placeholder="Event Name">
    <textarea id="eventDesc" class="w-full p-2 border rounded mb-3" placeholder="Description"></textarea>

    <button onclick="getLocation()" class="bg-green-600 text-white px-4 py-2 rounded mb-3">
      📍 Use My Location
    </button>

    <div id="coords" class="text-sm text-gray-600 mb-3"></div>

    <button onclick="createEvent()" class="bg-blue-600 text-white px-4 py-2 rounded">
      Create Event
    </button>
  </div>

  <!-- MAP -->
  <div class="bg-white p-6 rounded-xl shadow">
    <h2 class="text-xl font-semibold mb-4">Map</h2>
    <div id="map" class="h-80 rounded"></div>
  </div>

  <!-- EVENTS LIST -->
  <div class="bg-white p-6 rounded-xl shadow">
    <h2 class="text-xl font-semibold mb-4">Events</h2>
    <div id="eventsList" class="space-y-4"></div>
  </div>

</div>

<script>
let map = L.map('map').setView([13.0827, 80.2707], 13); // Chennai default

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap'
}).addTo(map);

let marker;
let currentCoords = null;

// GET GPS LOCATION
function getLocation() {
  navigator.geolocation.getCurrentPosition((pos) => {
    let lat = pos.coords.latitude;
    let lng = pos.coords.longitude;

    currentCoords = { lat, lng };

    document.getElementById("coords").innerText =
      `Latitude: ${lat}, Longitude: ${lng}`;

    if (marker) map.removeLayer(marker);

    marker = L.marker([lat, lng]).addTo(map)
      .bindPopup("Event Location")
      .openPopup();

    map.setView([lat, lng], 15);
  });
}

// CREATE EVENT
function createEvent() {
  let name = document.getElementById("eventName").value;
  let desc = document.getElementById("eventDesc").value;

  if (!name || !currentCoords) {
    alert("Add event name and location!");
    return;
  }

  let eventHTML = `
    <div class="border p-4 rounded-lg shadow">
      <h3 class="font-bold text-lg">${name}</h3>
      <p class="text-gray-600">${desc}</p>
      <p class="text-sm mt-2">📍 ${currentCoords.lat}, ${currentCoords.lng}</p>
      <button onclick="viewOnMap(${currentCoords.lat}, ${currentCoords.lng})"
        class="mt-2 bg-purple-600 text-white px-3 py-1 rounded">
        View on Map
      </button>
    </div>
  `;

  document.getElementById("eventsList").innerHTML += eventHTML;

  alert("Event Created!");
}

// VIEW EVENT ON MAP
function viewOnMap(lat, lng) {
  map.setView([lat, lng], 15);

  if (marker) map.removeLayer(marker);

  marker = L.marker([lat, lng]).addTo(map)
    .bindPopup("Selected Event")
    .openPopup();
}
</script>

</body>
</html>
